name: 575_project
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - jupyter
  - ipykernel

  - pip:
    # Data handling
    - python-dotenv      # loading .env files
    - pandas             # data manipulation
    - numpy              # numerical operations
    - duckdb              # SQL queries on dataframes 
    - pyarrow             # efficient data format for large datasets

    # HuggingFace
    - datasets==3.1.0
    - huggingface-hub>=1.5.0,<2.0.0
    - transformers>=4.40.0,<6.0.0

    # BM25
    - rank-bm25          # BM25 implementation

    # Semantic search
    - sentence-transformers  # embedding model
    - faiss-cpu              # vector index (cpu version is fine for our size)

    # App
    - streamlit          # web app

    # Utilities
    - tqdm               # progress bars (helpful when encoding 112K products)
